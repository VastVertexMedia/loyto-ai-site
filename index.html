<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loyto.ai – Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #000814;
        --text: #cfd9ff;
        --accent: #4ae5ff;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: radial-gradient(circle at top, #001233 0, var(--bg) 50%, #000 100%);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
      }
      .logo-mark {
        width: 64px;
        height: 64px;
        border-radius: 999px;
        overflow: hidden;
        background: radial-gradient(circle at 20% 0, #4dd3ff, #1f4dff);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 26px rgba(34, 166, 255, 0.7);
        margin-bottom: 20px;
      }
      .logo-mark svg {
        width: 72%;
        height: 72%;
      }
      h1 {
        font-size: 1.9rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }
      h1 span {
        color: var(--accent);
      }
      .msg {
        font-size: 1.05rem;
        max-width: 520px;
        line-height: 1.5;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 40 40">
        <circle cx="10" cy="28" r="3" fill="#4ae5ff" />
        <circle cx="28" cy="26" r="3" fill="#4ae5ff" />
        <circle cx="22" cy="11" r="3" fill="#4ae5ff" />
        <circle cx="14" cy="17" r="3" fill="#4ae5ff" />
        <line x1="10" y1="28" x2="14" y2="17" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" />
        <line x1="14" y1="17" x2="22" y2="11" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" />
        <line x1="14" y1="17" x2="28" y2="26" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" />
        <line x1="22" y1="11" x2="28" y2="26" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" />
      </svg>
    </div>

    <h1><span>Loyto.ai</span></h1>
    <div class="msg">
      Loyto.ai is currently being updated.<br /><br />
      Please check back shortly.
    </div>
  </body>
</html>
